# NTC WiFi HTTP VirtualHost Configuration
# File: /etc/apache2/sites-available/ntc-wifi.conf

<VirtualHost *:80>
    ServerName 192.168.3.252
    
    # ==================================================
    # CAPTIVE PORTAL DETECTION - iOS
    # ==================================================
    Redirect 302 /hotspot-detect.html http://192.168.3.252/portal/
    Redirect 302 /library/test/success.html http://192.168.3.252/portal/
    Redirect 302 /success.txt http://192.168.3.252/portal/
    
    # ==================================================
    # CAPTIVE PORTAL DETECTION - Android
    # ==================================================
    Redirect 302 /generate_204 http://192.168.3.252/portal/
    Redirect 302 /gen_204 http://192.168.3.252/portal/
    
    # ==================================================
    # CAPTIVE PORTAL DETECTION - Windows
    # ==================================================
    Redirect 302 /ncsi.txt http://192.168.3.252/portal/
    Redirect 302 /connecttest.txt http://192.168.3.252/portal/
    
    # ==================================================
    # PUBLIC WIFI PORTAL
    # ==================================================
    
    Alias /portal /opt/ntc-wifi/public-portal/dist
    <Directory /opt/ntc-wifi/public-portal/dist>
        Require all granted
        DirectoryIndex index.html

        AddType text/css .css
        AddType application/javascript .js
        AddType application/json .json
        AddType image/svg+xml .svg

        RewriteEngine On
        RewriteBase /portal/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /portal/index.html [L]
    </Directory>

    # ==================================================
    # BACKEND API PROXY
    # ==================================================
    
    ProxyPreserveHost On
    ProxyTimeout 300
    
    <Location /api/>
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
        
        ProxyPass http://127.0.0.1:8000/api/
        ProxyPassReverse http://127.0.0.1:8000/api/
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/ntc-wifi-error.log
    CustomLog ${APACHE_LOG_DIR}/ntc-wifi-access.log combined
</VirtualHost>

# ==================================================
# APPLE CAPTIVE PORTAL DETECTION DOMAINS
# ==================================================
<VirtualHost *:80>
    ServerName captive.apple.com
    ServerAlias www.apple.com
    
    # Redirect ALL requests to portal
    RedirectMatch 302 ^/.*$ http://192.168.3.252/portal/
    
    ErrorLog ${APACHE_LOG_DIR}/ntc-wifi-error.log
    CustomLog ${APACHE_LOG_DIR}/ntc-wifi-access.log combined
</VirtualHost>

# ==================================================
# ANDROID CAPTIVE PORTAL DETECTION DOMAINS
# ==================================================
<VirtualHost *:80>
    ServerName connectivitycheck.gstatic.com
    ServerAlias clients3.google.com
    ServerAlias www.google.com
    
    # Redirect ALL requests to portal
    RedirectMatch 302 ^/.*$ http://192.168.3.252/portal/
    
    ErrorLog ${APACHE_LOG_DIR}/ntc-wifi-error.log
    CustomLog ${APACHE_LOG_DIR}/ntc-wifi-access.log combined
</VirtualHost>
