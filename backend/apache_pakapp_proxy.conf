# Apache Proxy Configuration for NTC WiFi Backend

# Enable required modules first:
# sudo a2enmod proxy proxy_http headers
# sudo systemctl restart apache2

<VirtualHost *:80>
    ServerName pmfreewifi.local
    
    # Proxy API requests to FastAPI backend
    ProxyPreserveHost On
    ProxyPass /api http://localhost:8000/api
    ProxyPassReverse /api http://localhost:8000/api
    
    # Proxy media files
    ProxyPass /media http://localhost:8000/media
    ProxyPassReverse /media http://localhost:8000/media
    
    # Pass headers to backend
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/ntc_wifi_error.log
    CustomLog ${APACHE_LOG_DIR}/ntc_wifi_access.log combined
</VirtualHost>
